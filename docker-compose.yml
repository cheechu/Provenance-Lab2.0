version: "3.9"

services:
  api:
    build: .
    container_name: casai-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/casai.db
      - MOCK_ML=true
      - JWT_SECRET_KEY=change-me-in-production
      - DEBUG=true
    volumes:
      - ./data:/app/data
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

